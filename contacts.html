<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>emannysss · Контакты</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0B0C0E; font-family: 'Inter', sans-serif; color: #EFF3F8; line-height: 1.4; }
        .gradient-text { background: linear-gradient(135deg, #6EFF8E, #3B82F6); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: 700; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 28px; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 28px 0 20px; border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap; gap: 16px; }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(145deg, #FFFFFF 0%, #6EFF8E 100%); background-clip: text; -webkit-background-clip: text; color: transparent; text-decoration: none; }
        .nav-links { display: flex; gap: 28px; font-weight: 500; }
        .nav-links a { color: #BDC5D4; text-decoration: none; font-size: 1rem; transition: 0.2s; }
        .nav-links a:hover { color: white; }
        .section { padding: 80px 0; }
        .section-title { font-size: 2.2rem; font-weight: 700; margin-bottom: 16px; text-align: center; }
        .section-sub { color: #919AB0; margin-bottom: 48px; font-size: 1.1rem; text-align: center; }
        .contacts-grid { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; }
        .contact-card { background: #111317; border-radius: 28px; padding: 40px 32px; border: 1px solid #20222B; text-align: center; min-width: 200px; transition: 0.2s; text-decoration: none; color: inherit; }
        .contact-card:hover { border-color: #3B82F6; transform: translateY(-4px); }
        .contact-icon { font-size: 3rem; margin-bottom: 16px; }
        .contact-card h3 { font-size: 1.5rem; margin-bottom: 8px; }
        .contact-card p { color: #9AA2B5; font-size: 0.9rem; }
        .contact-note { text-align: center; margin-top: 48px; padding: 24px; background: rgba(59,130,246,0.1); border-radius: 28px; border: 1px solid rgba(59,130,246,0.2); }
        footer { padding: 48px 0; text-align: center; color: #656C86; font-size: 0.85rem; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px; }
        @media (max-width: 780px) { .navbar { flex-direction: column; align-items: flex-start; } }
	footer {
            background: #07080A;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 60px 0 30px;
            margin-top: 60px;
        }
        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 40px;
            margin-bottom: 40px;
        }
        .footer-logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(145deg, #FFFFFF 0%, #6EFF8E 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }
        .footer-desc {
            color: #919AB0;
            line-height: 1.5;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .footer-social {
            display: flex;
            gap: 16px;
        }
        .footer-social a {
            color: #919AB0;
            font-size: 1.3rem;
            transition: 0.2s;
        }
        .footer-social a:hover {
            color: #6EFF8E;
            transform: translateY(-2px);
        }
        .footer-column h4 {
            color: #EFF3F8;
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .footer-column ul {
            list-style: none;
        }
        .footer-column ul li {
            margin-bottom: 12px;
        }
        .footer-column ul li a {
            color: #919AB0;
            text-decoration: none;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .footer-column ul li a:hover {
            color: #6EFF8E;
        }
        .footer-contacts li {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #919AB0;
            font-size: 0.9rem;
        }
        .footer-contacts li i {
            width: 24px;
            color: #6EFF8E;
        }
        .footer-contacts li a {
            color: #919AB0;
            text-decoration: none;
        }
        .footer-contacts li a:hover {
            color: #6EFF8E;
        }
        .footer-bottom {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 30px;
            text-align: center;
            color: #656C86;
            font-size: 0.8rem;
        }
        .footer-bottom p {
            margin: 8px 0;
        }
        @media (max-width: 780px) {
            .footer-content {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .footer-social {
                justify-content: center;
            }
            .footer-contacts li {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <a href="index.html" class="logo">⚡ emannysss</a>
            <div class="nav-links">
                <a href="index.html">Игры</a>
                <a href="films.html">Фильмы</a>
                <a href="contacts.html">Контакты</a>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="container">
            <h2 class="section-title">Свяжись со <span class="gradient-text">мной</span></h2>
            <div class="section-sub"></div>
            <div class="contacts-grid">
                <a href="https://t.me/emannyss" target="_blank" class="contact-card">
                    <div class="contact-icon"><i class="fab fa-telegram" style="color: #0088cc;"></i></div>
                    <h3>Telegram</h3>
                    <p>@emannyss</p>
                </a>
                <a href="https://vk.com/emannyss" target="_blank" class="contact-card">
                    <div class="contact-icon"><i class="fab fa-vk" style="color: #0077ff;"></i></div>
                    <h3>ВКонтакте</h3>
                    <p>@emannyss</p>
                </a>
                <a href="https://boosty.to/emannys" target="_blank" class="contact-card">
                    <div class="contact-icon"><i class="fas fa-crown" style="color: #f9a825;"></i></div>
                    <h3>Boosty</h3>
                    <p>emannys</p>
                </a>
                <a href="https://github.com/emannysss" target="_blank" class="contact-card">
                    <div class="contact-icon"><i class="fab fa-github" style="color: #ffffff;"></i></div>
                    <h3>GitHub</h3>
                    <p>@emannysss</p>
                </a>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>© 2026 emannysss. Все права защищены.</p>
            </div>
        </div>
    </footer>
</body>
</html>
